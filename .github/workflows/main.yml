name: CI Pipeline - MLflow Model Training

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Trigger manual dari tab Actions

permissions:
  contents: write

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ─── 2. Setup Python ───────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ─── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn "mlflow>=2.19.0,<3.0" \
                      flask prometheus-client matplotlib pytest flake8

      # ─── 4. Lint ───────────────────────────────────────────────────────────
      - name: Lint with flake8
        run: |
          flake8 MLProject/modelling.py test_pipeline.py --ignore=E501

      # ─── 5. Unit tests ─────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          pytest test_pipeline.py -q

      # ─── 6. Train model dengan MLflow run ──────────────────────────────────
      - name: Train model with MLflow run
        run: |
          cd MLProject
          mlflow run . --env-manager=local \
            --entry-point main \
            -P train_csv=country_vaccinations_train.csv \
            -P test_csv=country_vaccinations_test.csv

      # ─── 7. Upload artefak MLflow ke GitHub ────────────────────────────────
      # (memenuhi kriteria Skilled: simpan artefak ke GitHub)
      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: |
            MLProject/mlruns.db
            MLProject/models/
          retention-days: 30

      # ─── 8. Build Docker Image ─────────────────────────────────────────────
      # (memenuhi kriteria Advance: mlflow build-docker)
      - name: Build Docker Image with mlflow build-docker
        run: |
          if [ -d "MLProject/models/latest" ]; then
            mlflow models build-docker \
              -m MLProject/models/latest \
              -n wilsonoey/smsml-model \
              --enable-mlserver \
              --env-manager local
            echo "Docker image built successfully: wilsonoey/smsml-model"
          else
            echo "⚠ No model found at MLProject/models/latest, skipping Docker build."
            exit 1
          fi

      # ─── 9. Push Docker Image ke Docker Hub ────────────────────────────────
      - name: Push Docker Image to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker push wilsonoey/smsml-model
            echo "Docker image pushed: wilsonoey/smsml-model"
          else
            echo "⚠ DOCKER_USERNAME/DOCKER_PASSWORD secrets not set. Skipping push."
          fi
