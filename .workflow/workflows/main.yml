name: CI Pipeline - MLflow Model Training

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
  pull_request:
    branches:
      - main
      - master

jobs:
  train_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn "mlflow>=2.19.0" flask prometheus-client matplotlib pytest flake8

      - name: Lint with flake8
        run: |
          flake8 MLProject/modelling.py test_pipeline.py --ignore=E501

      - name: Run unit tests
        run: |
          pytest test_pipeline.py -q

      - name: Train model with MLflow run
        run: |
          cd MLProject
          mlflow run . --env-manager=local --entry-point main -P input_csv=covid_preprocessing.txt

      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model-artifacts
          path: |
            MLProject/mlruns/
            MLProject/models/
          retention-days: 30

      - name: Build Docker Image with mlflow build-docker
        run: |
          if [ -d "MLProject/models/latest" ]; then
            mlflow models build-docker \
              -m MLProject/models/latest \
              -n wilsonoey/smsml-model \
              --enable-mlserver
            echo "Docker image built successfully."
          else
            echo "No model artifact found at MLProject/models/latest, skipping docker build."
          fi

      - name: Push Docker Image to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker push wilson_oey/smsml-model
            echo "Docker image pushed to Docker Hub."
          else
            echo "Docker credentials not configured. Skipping push to Docker Hub."
          fi
